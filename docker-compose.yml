version: "3.9"

services:
  # ── Qdrant Vector Database ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant 
      - QDRANT_PORT=6333
    volumes:
      - ./backend:/app 
      - hf_cache:/root/.cache/huggingface 
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage:
  hf_cache:
