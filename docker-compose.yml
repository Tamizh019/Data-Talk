services:
  # ── PostgreSQL: Using LOCAL installation (not Docker) ───────────
  # The local PostgreSQL on port 5432 is used directly.
  # Make sure pgvector extension is installed: CREATE EXTENSION IF NOT EXISTS vector;

  # ── Redis for Caching ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── FastAPI Backend (local dev only, optional) ──────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  hf_cache:
